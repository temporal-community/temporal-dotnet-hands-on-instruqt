title: Temporal .NET Hands-On
teaser: Five progressive C# exercises — from converting a fragile pipeline to implementing the Saga pattern.
description: |-
  A hands-on workshop teaching Temporal fundamentals through a vehicle
  transaction processing domain in C# / .NET 10.

  Starting from a realistic but fragile pipeline, you convert it to a
  durable Temporal workflow, then progressively add child workflows,
  parallel activities, signals and queries, and finally the Saga pattern
  for distributed compensation.

  Each exercise builds on the last. Practice and solution projects are
  both available in the sandbox — work through the TODOs at your own pace.
